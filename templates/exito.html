{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta enviada — Paola Ripa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    :root { --az: #00537c; --ro: #e35149; --do: #FFD700; }
    body { background: #f8fafb; }
    .btn-cta {
      background: var(--ro); color: #fff; font-weight: 600;
      font-size: 13px; padding: 13px 32px; border-radius: 50px;
      text-decoration: none; display: inline-block;
    }
    .btn-cta:hover { opacity: 0.9; color: #fff; }
  </style>
</head>
<body>
  <section style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;">
    <div>
      <i class="bi bi-check-circle-fill" style="font-size:4rem;color:var(--az);"></i>
      <h2 style="font-size:1.8rem;font-weight:800;color:#0a0a0a;margin:20px 0 10px;">¡Consulta enviada!</h2>
      <p style="font-size:14px;color:#666;max-width:400px;margin:0 auto 30px;line-height:1.8;">
        Gracias por escribirnos. Me comunico con vos a la brevedad por WhatsApp o email. ✨
      </p>
      <a href="/" class="btn-cta">Volver al inicio</a>
    </div>
  </section>
</body>
</html>
