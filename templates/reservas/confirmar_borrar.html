<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliminar consulta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    :root { --az: #00537c; --ro: #e35149; }
    body { background: #f0f6ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card-confirm { background: #fff; border-radius: 16px; padding: 36px 28px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,83,124,0.1); }
    .btn-borrar { background: var(--ro); color: #fff; font-weight: 700; font-size: 13px; padding: 12px; border-radius: 50px; border: none; flex: 1; }
    .btn-borrar:hover { opacity: 0.88; }
    .btn-cancelar { background: #fff; color: var(--az); font-weight: 700; font-size: 13px; padding: 12px; border-radius: 50px; border: 1.5px solid var(--az); text-decoration: none; flex: 1; text-align: center; }
    .btn-cancelar:hover { background: var(--az); color: #fff; }
  </style>
</head>
<body>
  <div class="card-confirm">
    <i class="bi bi-exclamation-triangle-fill" style="font-size:2.5rem;color:#e35149;"></i>
    <h4 style="font-weight:800;margin:16px 0 8px;">¿Eliminar consulta?</h4>
    <p style="font-size:13px;color:#666;margin-bottom:28px;">Estás por eliminar la consulta de <strong>{{ consulta.nombre_apellido }}</strong>. Esta acción no se puede deshacer.</p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-3">
        <button type="submit" class="btn-borrar">Sí, eliminar</button>
        <a href="{% url 'panel_detalle' consulta.pk %}" class="btn-cancelar">Cancelar</a>
      </div>
    </form>
  </div>
</body>
</html>
