<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel — Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    :root { --az: #00537c; --do: #FFD700; }
    body { background: #f0f6ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card-login { background: #fff; border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,83,124,0.1); }
    .card-login h2 { color: var(--az); font-weight: 800; font-size: 1.3rem; margin-bottom: 4px; }
    .form-control { border-radius: 10px; font-size: 14px; padding: 10px 14px; }
    .form-control:focus { border-color: var(--az); box-shadow: 0 0 0 3px rgba(0,83,124,0.1); }
    .btn-login { background: var(--az); color: #fff; font-weight: 700; font-size: 14px; padding: 12px; border-radius: 50px; border: none; width: 100%; transition: opacity 0.2s; }
    .btn-login:hover { opacity: 0.88; }
    .error { background: #fff0f0; border: 1px solid #f5c0c0; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #c0392b; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card-login">
    <h2>Panel de consultas</h2>
    <p style="font-size:12px;color:#999;margin-bottom:24px;">Ingresá con tu usuario y contraseña</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label style="font-size:13px;font-weight:600;">Usuario</label>
        <input type="text" name="username" class="form-control mt-1" autofocus/>
      </div>
      <div class="mb-4">
        <label style="font-size:13px;font-weight:600;">Contraseña</label>
        <input type="password" name="password" class="form-control mt-1"/>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
  </div>
</body>
</html>
